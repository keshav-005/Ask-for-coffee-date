<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coffee Date Invite</title>
  <link rel="stylesheet" href="coffee-css.css" />
</head>

<body>
  <main class="stage">
    <div class="card" id="card">

      <section class="panel" id="askPanel">
        <h1 class="title" id="coffeeTitle"></h1>
        <p class="sub" id="coffeeSub"></p>
        <div class="controls">
          <button class="btn primary" id="yesBtn">Yes</button>
          <button class="btn" id="noBtn">No</button>
        </div>
      </section>

      <section class="panel" id="plead1" aria-hidden="true">
        <h1 class="title" id="plead1Title"></h1>
        <p class="sub" id="plead1Sub"></p>
        <div class="controls">
          <button class="btn primary" id="yesBtn2">Ok</button>
          <button class="btn" id="noBtn2">No</button>
        </div>
      </section>

      <section class="panel" id="plead2" aria-hidden="true">
        <h1 class="title" id="plead2Title"></h1>
        <p class="sub" id="plead2Sub"></p>
        <div class="controls">
          <button class="btn big" id="yesBtn3"></button>
        </div>
      </section>

      <section class="panel" id="animatePanel" aria-hidden="true">
        <div class="scene" id="scene">
          <svg viewBox="0 0 480 300" class="svg-scene" preserveAspectRatio="xMidYMid meet">
            <defs>
              <linearGradient id="wall" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="#fde68a" />
                <stop offset="100%" stop-color="#fef3c7" />
              </linearGradient>
            </defs>

            <rect x="0" y="0" width="480" height="300" fill="url(#wall)" />
            <rect x="0" y="220" width="480" height="80" fill="#e7e5e4" />

            <g id="tableGroup" transform="translate(0,0)">
              <ellipse cx="240" cy="200" rx="110" ry="28" fill="#a16207" opacity="0.25" />
              <rect x="170" y="160" width="140" height="18" rx="9" fill="#a16207" />
              <rect x="228" y="178" width="24" height="48" rx="6" fill="#b45309" />
            </g>

            <g id="leftChair">
              <g class="chair">
                <rect x="0" y="100" width="66" height="12" rx="6" fill="#b45309" />
                <rect x="0" y="70" width="66" height="26" rx="8" fill="#d97706" />
                <rect x="8" y="108" width="8" height="40" fill="#92400e" />
                <rect x="50" y="108" width="8" height="40" fill="#92400e" />
              </g>
            </g>

            <g id="rightChair">
              <g class="chair">
                <rect x="0" y="100" width="66" height="12" rx="6" fill="#b45309" />
                <rect x="0" y="70" width="66" height="26" rx="8" fill="#d97706" />
                <rect x="8" y="108" width="8" height="40" fill="#92400e" />
                <rect x="50" y="108" width="8" height="40" fill="#92400e" />
              </g>
            </g>

            <g id="cups">
              <g id="cup1" transform="translate(210,154)">
                <rect x="0" y="0" width="18" height="10" rx="4" fill="#e7e5e4" />
                <rect x="4" y="3" width="10" height="4" rx="2" fill="#a16207" />
              </g>
              <g id="cup2" transform="translate(250,154)">
                <rect x="0" y="0" width="18" height="10" rx="4" fill="#e7e5e4" />
                <rect x="4" y="3" width="10" height="4" rx="2" fill="#a16207" />
              </g>
            </g>

            <g id="meAvatar">
              <circle cx="40" cy="40" r="26" fill="#f5f5f4" stroke="#a8a29e" />
              <circle cx="32" cy="38" r="3" fill="#374151" />
              <circle cx="48" cy="38" r="3" fill="#374151" />
              <path d="M32 48 q8 8 16 0" stroke="#374151" stroke-width="2" fill="none" />
              <rect x="20" y="66" width="40" height="28" rx="10" fill="#93c5fd" />
            </g>

            <g id="herAvatar">
              <circle cx="40" cy="40" r="26" fill="#f5f5f4" stroke="#a8a29e" />
              <circle cx="32" cy="38" r="3" fill="#374151" />
              <circle cx="48" cy="38" r="3" fill="#374151" />
              <path d="M32 48 q8 8 16 0" stroke="#374151" stroke-width="2" fill="none" />
              <path d="M18 32 q22 -16 44 0 q-8 -16 -22 -16 q-14 0 -22 16" fill="#1f2937" opacity="0.9" />
              <rect x="20" y="66" width="40" height="28" rx="10" fill="#60a5fa" />
            </g>

          </svg>
        </div>
      </section>



    </div>
  </main>

  <script src="config.js"></script>
  <script>
    // ── Populate from config ──
    document.getElementById('coffeeTitle').textContent = CONFIG.coffeeTitle;
    document.getElementById('coffeeSub').textContent = CONFIG.coffeeSub;
    document.getElementById('plead1Title').textContent = CONFIG.plead1Title;
    document.getElementById('plead1Sub').textContent = CONFIG.plead1Sub;
    document.getElementById('plead2Title').textContent = CONFIG.plead2Title;
    document.getElementById('plead2Sub').textContent = CONFIG.plead2Sub;
    document.getElementById('yesBtn3').textContent = CONFIG.plead2Button;

    document.title = 'Coffee Date — ' + CONFIG.name;
  </script>
  <script src="coffee-js.js"></script>
</body>

</html>
